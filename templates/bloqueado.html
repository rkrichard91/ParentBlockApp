<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio Bloqueado - Enfócate en tu Camino</title>
    <!-- Importar tipografía moderna Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #0f172a; /* Slate 900 */
            --bg-end: #1e1b4b;   /* Indigo 950 */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-cyan: #38bdf8;
            --accent-purple: #c084fc;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-glow: rgba(56, 189, 248, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Elementos decorativos de fondo (luces de neón difusas) */
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            opacity: 0.4;
        }

        .glow-sphere-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-cyan);
            top: -100px;
            left: -100px;
            animation: float 20s infinite alternate;
        }

        .glow-sphere-2 {
            width: 500px;
            height: 500px;
            background: var(--accent-purple);
            bottom: -150px;
            right: -100px;
            animation: float 25s infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, -50px) scale(0.9); }
        }

        /* Tarjeta principal Glassmorphism */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3.5rem 2.5rem;
            width: 90%;
            max-width: 550px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        0 0 40px var(--glass-glow);
            position: relative;
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Icono de bloqueo brillante */
        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 2rem;
            position: relative;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .icon-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            animation: pulse 2.5s infinite;
            opacity: 0.6;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .icon-container svg {
            width: 32px;
            height: 32px;
            fill: var(--accent-cyan);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.75rem;
            background: linear-gradient(to right, var(--text-primary), #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Separador elegante */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            margin-bottom: 2.5rem;
        }

        /* Sección de la frase motivacional */
        .quote-box {
            position: relative;
            padding: 0 1.5rem;
        }

        .quote-icon {
            font-size: 3rem;
            font-family: serif;
            color: rgba(56, 189, 248, 0.2);
            position: absolute;
            top: -2.2rem;
            left: 0.5rem;
            user-select: none;
        }

        .quote-text {
            font-size: 1.25rem;
            font-weight: 300;
            line-height: 1.7;
            font-style: italic;
            color: #e2e8f0;
            margin-bottom: 1rem;
            min-height: 80px;
        }

        .quote-author {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--accent-cyan);
        }

        /* Botón de recarga de frases */
        .refresh-btn {
            margin-top: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Globos luminosos en segundo plano -->
    <div class="glow-sphere glow-sphere-1"></div>
    <div class="glow-sphere glow-sphere-2"></div>

    <!-- Tarjeta Principal -->
    <div class="card">
        <!-- Icono de Candado Inteligente -->
        <div class="icon-container">
            <svg viewBox="0 0 24 24">
                <path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a3,3,0,0,0-3,3V20a3,3,0,0,0,3,3H18a3,3,0,0,0,3-3V11A3,3,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM19,20a1,1,0,0,1-1,1H6a1,1,0,0,1-1-1V11a1,1,0,0,1,1-1H18a1,1,0,0,1,1,1Z"/>
                <path d="M12,13a2,2,0,0,0-2,2,1.86,1.86,0,0,0,.3,1L9.4,19.2a1,1,0,0,0,.9,1.4h3.4a1,1,0,0,0,.9-1.4L13.7,16A1.86,1.86,0,0,0,14,15,2,2,0,0,0,12,13Z"/>
            </svg>
        </div>

        <h1>Tiempo de Crecer</h1>
        <p class="subtitle">{{CUSTOM_MESSAGE}}</p>

        <div class="divider"></div>

        <!-- Caja de Citas Motivacionales -->
        <div class="quote-box">
            <span class="quote-icon">“</span>
            <p class="quote-text" id="quote">Cargando inspiración...</p>
            <p class="quote-author" id="author"></p>
        </div>

        <button class="refresh-btn" onclick="loadRandomQuote()">
            <svg style="width:14px; height:14px; fill:currentColor;" viewBox="0 0 24 24">
                <path d="M19,8l-4,4h3c0,3.31-2.69,6-6,6c-1.01,0-1.97-0.25-2.8-0.7l-1.46,1.46C8.97,19.54,10.43,20,12,20c4.42,0,8-3.58,8-8h3L19,8z M6,12 c0-3.31,2.69-6,6-6c1.01,0,1.97,0.25,2.8,0.7l1.46-1.46C15.03,4.46,13.57,4,12,4c-4.42,0-8,3.58-8,8H1l4,4l4-4H6z"/>
            </svg>
            Nueva Frase
        </button>
    </div>

    <script>
        const quotes = [
            { text: "El único modo de hacer un gran trabajo es amar lo que haces.", author: "Steve Jobs" },
            { text: "No cuentes los días, haz que los días cuenten.", author: "Muhammad Ali" },
            { text: "La concentración es el secreto de la fuerza en la política, en la guerra, en el comercio, en resumen, en todo manejo de los asuntos humanos.", author: "Ralph Waldo Emerson" },
            { text: "No te dejes distraer por el ruido. Enfócate en tu visión y sigue avanzando.", author: "Anónimo" },
            { text: "El éxito no es la clave de la felicidad. La felicidad es la clave del éxito. Si amas lo que haces, tendrás éxito.", author: "Albert Schweitzer" },
            { text: "La distracción es la destructora del genio. Mantén tu mente clara y tus metas firmes.", author: "Robin Sharma" },
            { text: "Tu tiempo es limitado, así que no lo desperdicies viviendo la vida de alguien más.", author: "Steve Jobs" },
            { text: "La disciplina es el puente entre tus metas y tus logros.", author: "Jim Rohn" },
            { text: "Haz hoy lo que otros no quieren hacer, y mañana lograrás lo que otros no pueden lograr.", author: "Jerry Rice" },
            { text: "Es más fácil resistirse al principio que al final.", author: "Leonardo da Vinci" },
            { text: "Lo que haces hoy puede mejorar todos tus mañanas.", author: "Ralph Marston" },
            { text: "Si trabajas en algo que realmente te importa, no tienes que ser empujado. Tu visión te guiará.", author: "Steve Jobs" }
        ];

        function loadRandomQuote() {
            const quoteEl = document.getElementById("quote");
            const authorEl = document.getElementById("author");
            
            // Añadir un efecto de transición suave
            quoteEl.style.opacity = 0;
            authorEl.style.opacity = 0;
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * quotes.length);
                const item = quotes[randomIndex];
                quoteEl.textContent = item.text;
                authorEl.textContent = `— ${item.author}`;
                
                quoteEl.style.opacity = 1;
                authorEl.style.opacity = 1;
            }, 300);
        }

        // Transición de opacidad inicial para las frases
        document.getElementById("quote").style.transition = "opacity 0.3s ease";
        document.getElementById("author").style.transition = "opacity 0.3s ease";

        // Cargar frase al iniciar la página
        window.onload = loadRandomQuote;
    </script>
</body>
</html>
